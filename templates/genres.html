{% extends "base.html" %}
{% block title %}Genres — CineRec{% endblock %}
{% block content %}

<div class="page-header">
  <div><h1>GENRES</h1><div class="sub">{{ genres|length }} genre categories</div></div>
</div>

<div class="two-col">
  <div class="card" style="align-self:start;">
    <div class="section-title" style="font-size:1.1rem;margin-bottom:1rem;">ADD GENRE</div>
    <form method="POST">
      <div class="form-group">
        <label>Genre Name *</label>
        <input class="form-control" name="genre_name" required placeholder="e.g. Western">
      </div>
      <button class="btn btn-primary" type="submit">Add Genre</button>
    </form>
  </div>

  <div class="card">
    <div style="display:flex;flex-wrap:wrap;gap:.7rem;">
      {% for g in genres %}
      <div style="background:var(--surface);border:1px solid var(--border);padding:.6rem 1.1rem;border-radius:var(--radius);display:flex;align-items:center;gap:.8rem;">
        <span class="genre-tag" style="margin:0;">{{ g.genre_name }}</span>
        <span style="color:var(--muted);font-size:.78rem;">{{ g.movie_count }} movies</span>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

{% endblock %}
